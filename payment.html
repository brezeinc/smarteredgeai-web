<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarterEdge AI - Secure Checkout</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Healthcare Background Image */
      background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                  url('http://googleusercontent.com/image_collection/image_retrieval/3830395945307478160_0');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 3rem;
      /* Glassmorphism Effect */
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #14b8a6; /* Emerald Teal */
      margin-bottom: 1rem;
    }

    h1 { 
      font-size: 2rem; 
      color: #0f172a;
      margin-bottom: 2rem; 
    }

    /* Review Box */
    .review-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 2rem;
      text-align: left;
    }

    .line-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      color: #475569;
      font-weight: 500;
    }

    .grand-total {
      border-top: 2px solid #e2e8f0;
      padding-top: 15px;
      margin-top: 15px;
      font-size: 1.3rem;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      color: #0f172a;
    }

    /* Primary Stripe Button */
    .btn-stripe {
      background: #2563eb; /* Medical Blue */
      color: white;
      border: none;
      padding: 18px;
      width: 100%;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .btn-stripe:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }

    .btn-stripe:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #64748b;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .back-link:hover { color: #2563eb; }
  </style>
</head>
<body>

  <div class="container">
    <div class="label">Secure Health-Pay</div>
    <h1>Final <span style="color: #2563eb;">Review</span></h1>

    <div id="review-list" class="review-box">
      </div>

    <button id="checkout-button" class="btn-stripe">Complete Secure Checkout</button>
    <a href="order.html" class="back-link">← Adjust Requisition</a>
  </div>

  <script>
    // Initialize Stripe (Replace with your actual Public Key)
    const stripe = Stripe('pk_test_your_key_here');
    const checkoutButton = document.getElementById('checkout-button');
    const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];

    function renderReview() {
      const container = document.getElementById('review-list');
      if (cart.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Your requisition is empty.</p>";
        checkoutButton.disabled = true;
        return;
      }

      let total = 0;
      let html = "";
      cart.forEach(item => {
        html += `
          <div class="line-item">
            <span>${item.name} x${item.qty}</span>
            <span>$${(item.price * item.qty).toFixed(2)}</span>
          </div>`;
        total += item.price * item.qty;
      });

      html += `
        <div class="grand-total">
          <span>Total Balance</span>
          <span>$${total.toFixed(2)}</span>
        </div>`;
      
      container.innerHTML = html;
    }

    checkoutButton.addEventListener('click', async () => {
      checkoutButton.innerText = "Authorizing...";
      checkoutButton.disabled = true;

      try {
        // Send cart data to your Node.js backend
        const response = await fetch('/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: cart })
        });

        const session = await response.json();

        // Redirect to Stripe's secure hosted payment page
        const result = await stripe.redirectToCheckout({
          sessionId: session.id,
        });

        if (result.error) {
          throw new Error(result.error.message);
        }
      } catch (err) {
        alert("Payment Error: " + err.message);
        checkoutButton.disabled = false;
        checkoutButton.innerText = "Complete Secure Checkout";
      }
    });

    renderReview();
  </script>
</body>
</html>
