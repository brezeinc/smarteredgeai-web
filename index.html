<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarterEdge AI</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 1rem;
    }

    .accent {
      color: #6366f1;
    }

    p {
      font-size: 1rem;
      color: #666;
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #6366f1;
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">SmarterEdge AI</div>
    <h1>Coming <span class="accent">Soon</span></h1>
    <div class="divider"></div>
    <p>Something new is on the way. Check back soon.</p>
  </div>
</body>
</html>
