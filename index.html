<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarterEdge AI - Store</title>
  <style>
    /* Reset & Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(10px);
    }

    /* Typography from your snippet */
    .label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 1rem;
    }

    .accent {
      color: #6366f1;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #6366f1;
      margin: 1.5rem auto;
    }

    /* Cart Summary Styling */
    .cart-summary {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin: 2rem 0;
      text-align: left;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #ccc;
    }

    .total-line {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 15px;
      padding-top: 15px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      color: #fff;
    }

    /* Buttons */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 14px;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn-pay {
      background: #6366f1;
      color: white;
      border: none;
    }

    .btn-pay:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
    }

    .btn-order {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-order:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #6366f1;
    }

    .btn-clear {
      background: transparent;
      color: #666;
      border: none;
      font-size: 0.8rem;
      margin-top: 10px;
      text-decoration: underline;
    }

    .btn-clear:hover { color: #ff4d4d; }

    .empty-msg { color: #666; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <div class="label">SmarterEdge AI</div>
    <h1>Premium <span class="accent">Store</span></h1>
    <div class="divider"></div>

    <div id="cart-display" class="cart-summary">
        <p class="empty-msg">Scanning for items...</p>
    </div>
    
    <div class="button-group">
        <a href="order.html" class="btn btn-order">Browse Products</a>
        <a href="payment.html" id="pay-link" class="btn btn-pay" style="display: none;">Complete Order</a>
        <button onclick="clearCart()" class="btn btn-clear" id="clear-btn" style="display: none;">Clear Cart</button>
    </div>
  </div>

  <script>
    function updateCartUI() {
        const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
        const display = document.getElementById('cart-display');
        const payLink = document.getElementById('pay-link');
        const clearBtn = document.getElementById('clear-btn');

        if (cart.length === 0) {
            display.innerHTML = '<p class="empty-msg">Your cart is currently empty.</p>';
            payLink.style.display = 'none';
            clearBtn.style.display = 'none';
            return;
        }

        let html = '<p class="label" style="margin-bottom:1rem; color:#6366f1;">Order Summary</p>';
        let total = 0;
        cart.forEach(item => {
            html += `
                <div class="cart-item">
                    <span>${item.name} (x${item.qty})</span>
                    <span>$${(item.price * item.qty).toFixed(2)}</span>
                </div>`;
            total += item.price * item.qty;
        });
        
        html += `
            <div class="total-line">
                <span>Total Amount</span>
                <span>$${total.toFixed(2)}</span>
            </div>`;
        
        display.innerHTML = html;
        payLink.style.display = 'block';
        clearBtn.style.display = 'block';
    }

    function clearCart() {
        localStorage.removeItem('shoppingCart');
        updateCartUI();
    }

    // Initialize UI
    updateCartUI();
  </script>
</body>
</html>
