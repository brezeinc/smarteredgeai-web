<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmarterEdge AI - Medical Store</title>
  <style>
    /* Reset & Base Styles */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Healthcare Gradient: Light Grey-Blue to White */
      background: linear-gradient(135deg, #f0f4f8 0%, #ffffff 100%);
      color: #1e293b; /* Deep Slate */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
      background: #ffffff;
      /* Soft, professional shadow */
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b; /* Slate Gray */
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #0f172a; /* Navy Blue */
      margin-bottom: 1rem;
    }

    .accent {
      color: #2563eb; /* Primary Medical Blue */
    }

    .divider {
      width: 50px;
      height: 3px;
      background: #14b8a6; /* Light Teal Accent */
      margin: 1.5rem auto;
      border-radius: 2px;
    }

    /* Cart Summary Styling */
    .cart-summary {
      background: #f0fdfa; /* Very Light Teal Background */
      border: 1px solid #ccfbf1;
      border-radius: 16px;
      padding: 20px;
      margin: 2rem 0;
      text-align: left;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #334155;
      font-weight: 500;
    }

    .total-line {
      border-top: 2px solid #ccfbf1;
      margin-top: 15px;
      padding-top: 15px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      color: #0f172a;
      font-size: 1.1rem;
    }

    /* Buttons */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: block;
      padding: 16px;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      font-size: 1rem;
      border: none;
    }

    .btn-pay {
      background: #2563eb; /* Blue */
      color: white;
    }

    .btn-pay:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }

    .btn-order {
      background: #ffffff;
      color: #2563eb;
      border: 2px solid #e2e8f0;
    }

    .btn-order:hover {
      background: #f8fafc;
      border-color: #2563eb;
    }

    .btn-clear {
      background: transparent;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 10px;
      text-decoration: none;
      font-weight: 500;
    }

    .btn-clear:hover { 
      color: #ef4444; /* Alert Red */
    }

    .empty-msg { 
      color: #94a3b8; 
      font-style: italic; 
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="label">SmarterEdge AI — Health</div>
    <h1>Provider <span class="accent">Portal</span></h1>
    <div class="divider"></div>

    <div id="cart-display" class="cart-summary">
        <p class="empty-msg">Checking system for orders...</p>
    </div>
    
    <div class="button-group">
        <a href="order.html" class="btn btn-order">View Solutions</a>
        <a href="payment.html" id="pay-link" class="btn btn-pay" style="display: none;">Process Secure Payment</a>
        <button onclick="clearCart()" class="btn btn-clear" id="clear-btn" style="display: none;">Reset Order</button>
    </div>
  </div>

  <script>
    function updateCartUI() {
        const cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
        const display = document.getElementById('cart-display');
        const payLink = document.getElementById('pay-link');
        const clearBtn = document.getElementById('clear-btn');

        if (cart.length === 0) {
            display.innerHTML = '<p class="empty-msg">No active items in the requisition.</p>';
            payLink.style.display = 'none';
            clearBtn.style.display = 'none';
            return;
        }

        // Using Teal for the internal header
        let html = '<p class="label" style="margin-bottom:1rem; color:#14b8a6; font-size:0.65rem;">Requisition Summary</p>';
        let total = 0;
        cart.forEach(item => {
            html += `
                <div class="cart-item">
                    <span>${item.name} (x${item.qty})</span>
                    <span>$${(item.price * item.qty).toFixed(2)}</span>
                </div>`;
            total += item.price * item.qty;
        });
        
        html += `
            <div class="total-line">
                <span>Total Balance</span>
                <span>$${total.toFixed(2)}</span>
            </div>`;
        
        display.innerHTML = html;
        payLink.style.display = 'block';
        clearBtn.style.display = 'block';
    }

    function clearCart() {
        localStorage.removeItem('shoppingCart');
        updateCartUI();
    }

    // Initialize UI
    updateCartUI();
  </script>
</body>
</html>
